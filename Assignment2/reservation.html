<!DOCTYPE html>
<html>
    <head>
        <title>Reservation</title>
        <meta charset="utf-8">
        <meta name="description" content="Web Development">
        <meta name="keywords" content="HTML and CSS">
        <meta name="author" content="Slater Brewer">
        <link href="css\style.css" rel="stylesheet">
        <script src="js/jquery-4.0.0.min.js"></script>
        <script src="js/script.js"></script>
        <script src="js/reccomend.js"></script>
    </head>
    <body>
        <div class="container">
            <nav class="navigation">
                <a href="index.html">Home</a>
                <a href="restaurant.html">Restaurant</a>
                <a href="reccomend.html">Reccomendation</a>
                <a href="register.html">Register</a>
                <a href="reservation.html">Reserve Table</a>
            </nav>
            
            <header>
                <h1 id="chosenoutput">Reservation</h1>
                 <div class="screenoverlay"></div>
            <form id="regform" method="post"
			action="http://mercury.swin.edu.au/it000000/formtest.php">
            </header>
            <fieldset>
			<legend>Reservation Details</legend>
        <div class="reserveform">
            <div class="textinput">
            <select id="restaurant" onchange="updateheading()">
                <option>Third Wave Cafe</option>
                <option>KFC</option>
                <option>Okami</option>
                <option>TenBBQ Hotpot</option>
                <option>1PlusPiece</option>
                <option>Chirnside Park Country Club</option>
            </select>
            </div>

			<div class="textinput">
				<label for="name">Full Name</label>
				<input id="name" type="text" name="name" />
			</div>

            <div class="textinput">
				<label for="email">Email Address</label>
				<input id="email" type="text" name="email" />
			</div>

            <div class="textinput">
				<label for="phone">Phone Number</label>
				<input id="phone" type="number" name="phone" />
			</div>
            <div class="textinput">
                <label for="date">Date</label>
                <input type="date" min="2026-05-31" max="2026-06-30">
                <br>
                <label for="time">Time</label>
                <input type="time" min="10:00" max="21:00">
            </div>
            <div class="textinput">
                <label for="deposit">Deposit Amount</label>
                <input type="text" id="deposit" readonly>

            </div>
            <div class="textinput">
                <label for="guestno">No. of Guests</label>
                <input type="number" id="guestno" name="guestno" max="12" min="1"/>
            </div>
            <div class="textinput">
                <label for="special">Special Requests</label>
                <input type="text" id="special" name="special">
            </div>
            <div class="payment">
                <select id="payopt" onchange="paymentmethod()">
                    <option value="">Select Payment Method</option>
                    <option value="voucher">voucher</option>
                    <option value="card">Visa/Mastercard</option>
                    <option value="card">American Express</option>
                </select>
            </div>
            <div id="voucherinput" style="display: none;">
                <label for="voucher">Voucher</label>
                <input id="voucher" type="number" name="voucher">
            </div>
            <div id="cardinput" style="display: none;">
                <label for="cardnumber">Card Numbers</label>
                <input id="cardnumber" type="text" name="cardnumber">
                <label for="cardexpiry">Expiry Date</label>
                <input id="cardexpiry" type="text" name="cardexpiry" placeholder="MM/YY">
                <label for="cvv">CVV/CVC</label>
                <input id="cvv" type="text" name="cvv" placeholder="CVV">
            </div>
            <div class="billemail">
                <label for="billemail">Billing Email</label>
                <input type="text" id="billemail" name="billemail">
                <br>
                <label for="sameemail">Use same Email</label>
                <input type="checkbox" id="sameemail" onchange="emailcopy()">
            </div>
        </div>
		    </fieldset>
		    <div class="buttoninput">
			    <input type="submit" value="Submit" />
		    </div>
        </div>
    </body>
</html>
